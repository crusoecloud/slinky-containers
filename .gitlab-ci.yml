# GitLab CI/CD Pipeline for Slinky Containers
# Automatically builds Slurm container images on every push

# Workflow rules - when to run pipelines
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# Pipeline stages
stages:
  - build
  - publish

# Default configuration for all jobs
default:
  image: docker:28-cli
  services:
    - name: docker:28-dind
      command: ["--mtu=1460"]
  before_script:
    - echo "$REG_TOKEN" | docker login -u "gitlab+deploy-token-12525871" --password-stdin "$CI_REGISTRY"

# Global variables
variables:
  # Docker configuration
  DOCKER_DRIVER: overlay2
  DOCKER_BUILDKIT: "1"
  BUILDX_EXPERIMENTAL: "1"
  BUILDKIT_CONFIG: "/etc/buildkit/buildkitd.toml"

  # Build configuration (can be overridden via GitLab CI/CD settings)
  SLURM_VERSION: "25.11"
  SLURM_VERSION_FULL: "25.11.2"
  LINUX_FLAVOR: "ubuntu24.04"
  BUILD_GROUP: "all"  # Options: core, all, extras
  BUILD_CONTEXT: "./schedmd/slurm"

  # Bake configuration
  BAKE_FILES: "--file ./docker-bake.hcl --file ./${SLURM_VERSION}/${LINUX_FLAVOR}/slurm.hcl"

  # Image lists
  CORE_IMAGES: "slurmctld slurmd slurmdbd slurmrestd sackd login slurmd-pyxis login-pyxis"
  GHCR_IMAGES: "slurmctld slurmd login slurmd-pyxis login-pyxis slurmrestd"

  # Image tagging strategy
  IMAGE_TAG_UNIQUE: "${SLURM_VERSION}-${LINUX_FLAVOR}-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
  IMAGE_TAG_BRANCH: "${SLURM_VERSION}-${LINUX_FLAVOR}-${CI_COMMIT_REF_SLUG}-latest"
  IMAGE_TAG_LATEST: "${SLURM_VERSION}-${LINUX_FLAVOR}-latest"

# Build job - builds all container images
build_images:
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: never
    - when: always
  script:
    # Navigate to build context
    - cd ${BUILD_CONTEXT}

    # Setup buildx builder
    # - docker buildx create --use --name builder || docker buildx use builder
    - docker buildx create --name mybuilder --use --buildkitd-config $BUILDKIT_CONFIG

    # Override bake HCL variable so output tags point to GitLab registry instead of ghcr.io default
    - export REGISTRY=${CI_REGISTRY_IMAGE}

    # Check if cache exists for this branch to speed up builds
    - |
      CACHE_REF="${CI_REGISTRY_IMAGE}/slurmctld:${IMAGE_TAG_BRANCH}"
      if docker manifest inspect ${CACHE_REF} &>/dev/null; then
        echo "Found existing cache, using it to speed up build"
      else
        echo "No cache found, building from scratch"
      fi

    # Build hpcx_base image first (required for Ubuntu 24.04 builds)
    - |
      if [ "${LINUX_FLAVOR}" = "ubuntu24.04" ]; then
        echo "Building hpcx_base image (required for Ubuntu 24.04)..."
        docker buildx bake \
          ${BAKE_FILES} \
          --set "*.cache-to=type=inline" \
          --set "*.cache-from=type=registry,ref=${CI_REGISTRY_IMAGE}/hpcx-base:cuda12.8.1-${LINUX_FLAVOR}" \
          --set "*.platform=linux/amd64" \
          --set "*.output=type=registry" \
          hpcx_base
        echo "hpcx_base image built successfully as ${CI_REGISTRY_IMAGE}/hpcx-base:cuda12.8.1-${LINUX_FLAVOR}"
      fi

    # Set suffix for commit specific tag
    - export SUFFIX="${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
    
    # Build all images using docker bake
    - |
      echo "Building images with docker bake..."
      docker buildx bake \
        ${BAKE_FILES} \
        --set "*.cache-to=type=inline" \
        --set "slurmctld.cache-from=type=registry,ref=${CI_REGISTRY_IMAGE}/slurmctld:${IMAGE_TAG_BRANCH}" \
        --set "slurmd.cache-from=type=registry,ref=${CI_REGISTRY_IMAGE}/slurmd:${IMAGE_TAG_BRANCH}" \
        --set "slurmdbd.cache-from=type=registry,ref=${CI_REGISTRY_IMAGE}/slurmdbd:${IMAGE_TAG_BRANCH}" \
        --set "slurmrestd.cache-from=type=registry,ref=${CI_REGISTRY_IMAGE}/slurmrestd:${IMAGE_TAG_BRANCH}" \
        --set "sackd.cache-from=type=registry,ref=${CI_REGISTRY_IMAGE}/sackd:${IMAGE_TAG_BRANCH}" \
        --set "login.cache-from=type=registry,ref=${CI_REGISTRY_IMAGE}/login:${IMAGE_TAG_BRANCH}" \
        --set "slurmd_pyxis.cache-from=type=registry,ref=${CI_REGISTRY_IMAGE}/slurmd-pyxis:${IMAGE_TAG_BRANCH}" \
        --set "login_pyxis.cache-from=type=registry,ref=${CI_REGISTRY_IMAGE}/login-pyxis:${IMAGE_TAG_BRANCH}" \
        --set "*.platform=linux/amd64" \
        --set "*.output=type=registry" \
        ${BUILD_GROUP}

    # Re-tag images with branch-latest tags for easier reference
    - |
      echo "Re-tagging images with branch-latest tags..."
      for IMAGE in ${CORE_IMAGES}; do
        echo "Tagging ${IMAGE}:${IMAGE_TAG_BRANCH}"
        docker buildx imagetools create \
          -t ${CI_REGISTRY_IMAGE}/${IMAGE}:${IMAGE_TAG_BRANCH} \
          ${CI_REGISTRY_IMAGE}/${IMAGE}:${IMAGE_TAG_UNIQUE}
      done

    # Re-tag hpcx-base with branch-latest tag (Ubuntu 24.04 only)
    - |
      if [ "${LINUX_FLAVOR}" = "ubuntu24.04" ]; then
        echo "Tagging hpcx-base with branch tag"
        docker buildx imagetools create \
          -t ${CI_REGISTRY_IMAGE}/hpcx-base:cuda12.8.1-${LINUX_FLAVOR}-${CI_COMMIT_REF_SLUG}-latest \
          ${CI_REGISTRY_IMAGE}/hpcx-base:cuda12.8.1-${LINUX_FLAVOR}
      fi

    - echo "Build complete! Images pushed to ${CI_REGISTRY_IMAGE}"

  tags:
    - docker

  timeout: 2h

# Publish job - re-tag main branch builds with production "latest" tags
publish_images:
  stage: publish
  script:
    - |
      echo "Publishing production tags for main branch..."
      for IMAGE in ${CORE_IMAGES}; do
        echo "Creating production tag: ${IMAGE}:${IMAGE_TAG_LATEST}"
        docker buildx imagetools create \
          -t ${CI_REGISTRY_IMAGE}/${IMAGE}:${IMAGE_TAG_LATEST} \
          ${CI_REGISTRY_IMAGE}/${IMAGE}:${IMAGE_TAG_BRANCH}
      done

    # Publish hpcx-base production tag (Ubuntu 24.04 only)
    - |
      if [ "${LINUX_FLAVOR}" = "ubuntu24.04" ]; then
        echo "Creating production tag for hpcx-base"
        docker buildx imagetools create \
          -t ${CI_REGISTRY_IMAGE}/hpcx-base:cuda12.8.1-${LINUX_FLAVOR}-latest \
          ${CI_REGISTRY_IMAGE}/hpcx-base:cuda12.8.1-${LINUX_FLAVOR}-${CI_COMMIT_REF_SLUG}-latest
      fi

    - echo "Production tags published successfully!"

  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

  needs:
    - build_images

  tags:
    - docker

# Publish to GitHub Container Registry (ghcr.io/crusoecloud)
# Copies images from GitLab registry to ghcr.io with auto-incrementing cmk.N tags
publish_ghcr:
  stage: publish
  variables:
    GHCR_REGISTRY: "ghcr.io/crusoecloud/cmk/slurm-containers"
  before_script:
    - echo "$REG_TOKEN" | docker login -u "gitlab+deploy-token-12525871" --password-stdin "$CI_REGISTRY"
    - echo "$Package_Pusher" | docker login ghcr.io -u crusoecloud --password-stdin
    - apk add --no-cache jq curl
  script:
    # Determine next cmk.N version
    - |
      REF_REPO="crusoecloud/cmk/slurm-containers/slurmd"
      TOKEN=$(curl -sf -u "_:${Package_Pusher}" \
        "https://ghcr.io/token?scope=repository:${REF_REPO}:pull" \
        | jq -r '.token') || true

      # Find the highest existing cmk.N for this slurm version
      MAX_N=""
      if [ -n "${TOKEN}" ] && [ "${TOKEN}" != "null" ]; then
        TAGS_JSON=$(curl -sf -H "Authorization: Bearer ${TOKEN}" \
          "https://ghcr.io/v2/${REF_REPO}/tags/list") || true
        if [ -n "${TAGS_JSON}" ] && ! echo "${TAGS_JSON}" | jq -e '.errors' &>/dev/null; then
          MAX_N=$(echo "${TAGS_JSON}" | jq -r '.tags[]' \
            | sed -n "s/^${SLURM_VERSION_FULL}-${LINUX_FLAVOR}-cmk\.\([0-9][0-9]*\)$/\1/p" \
            | sort -n | tail -1)
        fi
      fi

      # Set next version
      if [ -z "${MAX_N}" ]; then
        CMK_TAG="cmk.1"
        echo "No existing cmk tags found. Starting at ${CMK_TAG}"
      else
        CMK_TAG="cmk.$((MAX_N + 1))"
        echo "Latest: cmk.${MAX_N} -> next: ${CMK_TAG}"
      fi

      FULL_TAG="${SLURM_VERSION_FULL}-${LINUX_FLAVOR}-${CMK_TAG}"
      echo "Will publish as: ${FULL_TAG}"

    # Copy each image from GitLab registry to ghcr.io
    - |
      for IMAGE in ${GHCR_IMAGES}; do
        echo "  ${IMAGE}:${FULL_TAG}"
        docker buildx imagetools create \
          -t "${GHCR_REGISTRY}/${IMAGE}:${FULL_TAG}" \
          "${CI_REGISTRY_IMAGE}/${IMAGE}:${IMAGE_TAG_LATEST}"
      done

    - echo "Published 5 images to ghcr.io with tag ${SLURM_VERSION_FULL}-${LINUX_FLAVOR}-${CMK_TAG}"

  # Ensure only one publish_ghcr job runs at a time
  resource_group: publish-ghcr

  rules:
    # Only runs via "Run Pipeline" on main (CI/CD > Pipelines > Run Pipeline)
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

  tags:
    - docker
